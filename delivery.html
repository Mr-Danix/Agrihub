<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrihub | Delivery & Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
            --accent-yellow: #ffca3a;
            --text-dark: #1b4332;
            --bg-gray: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            color: var(--text-dark);
        }

        header {
            background-color: var(--primary-green);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            padding: 0 5%;
        }

        .checkout-form, .order-summary {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 { border-bottom: 2px solid var(--light-green); padding-bottom: 10px; margin-top: 0; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .payment-methods {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .payment-option {
            flex: 1;
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .payment-option.active { border-color: var(--primary-green); background: var(--light-green); }

        .order-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .total-row {
            border-top: 2px solid var(--light-green);
            margin-top: 1rem;
            padding-top: 1rem;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
        }

        .btn-confirm {
            background-color: var(--primary-green);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }

        .btn-confirm:hover { background-color: #1b4332; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Agrihub</h1>
    <a href="cart.html" style="color: white; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Shop</a>
</header>

<div class="container">
    <div class="checkout-form">
        <h2><i class="fas fa-truck"></i> Delivery Details</h2>
        <form id="delivery-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="e.g. Abebe Bikila" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="+251 9..." required>
            </div>
            <div class="form-group">
                <label>City / Region</label>
                <select>
                    <option>Addis Ababa</option>
                    <option>Oromia</option>
                    <option>Amhara</option>
                    <option>Sidama</option>
                    <option>Tigray</option>
                </select>
            </div>
            <div class="form-group">
                <label>Specific Address (Sub-city, Woreda, House No.)</label>
                <input type="text" placeholder="Bole, Woreda 03..." required>
            </div>

            <h2><i class="fas fa-credit-card"></i> Payment Method</h2>
            <div class="payment-methods">
                <div class="payment-option active" onclick="selectPayment(this)">
                    <i class="fas fa-mobile-alt"></i><br>Telebirr
                </div>
                <div class="payment-option" onclick="selectPayment(this)">
                    <i class="fas fa-university"></i><br>CBE Birr
                </div>
                <div class="payment-option" onclick="selectPayment(this)">
                    <i class="fas fa-money-bill-wave"></i><br>Cash on Delivery
                </div>
            </div>
        </form>
    </div>

    <div class="order-summary">
        <h2>Order Summary</h2>
        <div id="items-list">
            <div class="order-item">
                <span>Teff (100kg) x 1</span>
                <span>8,500 ETB</span>
            </div>
            <div class="order-item">
                <span>Organic Honey (1L) x 2</span>
                <span>1,200 ETB</span>
            </div>
        </div>
        
        <div class="order-item" style="color: #666;">
            <span>Delivery Fee</span>
            <span>250 ETB</span>
        </div>

        <div class="total-row">
            <span>Total</span>
            <span>9,950 ETB</span>
        </div>

        <button type="button" class="btn-confirm" onclick="placeOrder()">PLACE ORDER</button>
        <p style="font-size: 0.8rem; text-align: center; color: #777; margin-top: 10px;">
            <i class="fas fa-shield-alt"></i> Secure checkout by Agrihub
        </p>
    </div>
</div>

<script>
   document.addEventListener('DOMContentLoaded', () => {
    const itemsList = document.getElementById('items-list');
    const totalDisplay = document.querySelector('.total-row span:last-child');
    
    // 1. Pull data using your specific keys
    const savedCart = JSON.parse(localStorage.getItem('agriCart')) || [];
    const savedTotal = localStorage.getItem('agriTotal') || "0";

    // 2. Clear placeholder items
    itemsList.innerHTML = '';

    // 3. Loop through items
    if (savedCart.length === 0) {
        itemsList.innerHTML = '<p>No items found in cart.</p>';
    } else {
        savedCart.forEach(item => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'order-item';
            // Matches your inventory: item.icon, item.name, item.price
            itemDiv.innerHTML = `
                <span>${item.icon || '📦'} ${item.name}</span>
                <span>${item.price} ETB</span>
            `;
            itemsList.appendChild(itemDiv);
        });
    }

    // 4. Update the total (adding 250 ETB for shipping)
    const subtotal = parseFloat(savedTotal);
    const shipping = 250; 
    const finalTotal = subtotal + shipping;
    
    totalDisplay.innerText = `${finalTotal} ETB`;
});

function placeOrder() {
    alert("Order Successful! Your harvest from Agrihub is on its way.");
    
    // Clear everything after purchase
    localStorage.removeItem('agriCart');
    localStorage.removeItem('agriTotal');
    
    window.location.href = "index.html"; 
} document.addEventListener('DOMContentLoaded', () => {
    const itemsList = document.getElementById('items-list');
    const totalDisplay = document.querySelector('.total-row span:last-child');
    
    // 1. Pull data from localStorage
    const savedCart = JSON.parse(localStorage.getItem('agrihub_cart')) || [];
    const savedTotal = localStorage.getItem('agrihub_total') || "0";

    // 2. Clear the placeholder items
    itemsList.innerHTML = '';

    // 3. Loop through items and create HTML
    if (savedCart.length === 0) {
        itemsList.innerHTML = '<p>Your cart is empty</p>';
    } else {
        savedCart.forEach(item => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'order-item';
            // Use the property names you used in your cart (e.g., item.name, item.price)
            itemDiv.innerHTML = `
                <span>${item.name} x ${item.quantity || 1}</span>
                <span>${item.price} ETB</span>
            `;
            itemsList.appendChild(itemDiv);
        });
    }

    // 4. Update the total (adding 250 for delivery as an example)
    const finalTotal = parseFloat(savedTotal) + 250;
    totalDisplay.innerText = `${finalTotal} ETB`;
});

function placeOrder() {
    // Collect form data here if needed...
    alert("Order Successful! Your harvest is on its way.");
    
    // Clear cart after order is placed
    localStorage.removeItem('agrihub_cart');
    localStorage.removeItem('agrihub_total');
    
    window.location.href = "cart.html"; 
}
    function selectPayment(element) {
        document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
    }

    function placeOrder() {
        alert("Order Successful! Thank you for supporting Ethiopia's Digital Harvest.");
        window.location.href = "cart.html"; 
    }
</script>

</body>
</html>
