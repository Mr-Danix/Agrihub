<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>AgriHub | Home</title><link rel="stylesheet" href="style.css">
    <style>
        body{
            background-image: url('1.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }
        .panel { 
            background: #b87e7e;
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }
         .profile-pic{
    text-align:center;
    margin-bottom:25px;
}

.profile-pic img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #fff;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
    transition:0.3s;
}

.profile-pic img:hover{
    transform:scale(1.05);
}

.profile-pic input{
    display:none;
}
    </style>
</head>
<body>
    <header>
        <div class="logo">AgriHub</div>
       
    </header>
     <main class="wrap">
        <div class="panel fade-in" style="text-align:center; padding:80px 20px;">
            <h1 style="font-size:2.5rem">Ethiopia's Digital Harvest</h1>
            <p style="margin:20px 0; max-width:600px; margin-inline:auto;">Before we start our business lets take a tutorial to get familiar with our platform.</p>
            <button class="btn-main" style="width:auto" onclick="window.location.href='tutorial.html'">Take tutorial</button>
        </div>
    </main>
    <script>
        function showLogout() {
    var box = document.getElementById("logoutBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function logout() {
    // Redirect to sign in page
    window.location.href = "auth.html"; 
}
    </script>
    <script src="script.js"></script>
</body>
</html>
