<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>AgriHub | Login</title><link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    p{
        text-align: center;
        color: #000000;
    }
    a{
        padding: 5px;
    }
    
    .profile-pic{
    text-align:center;
    margin-bottom:25px;
}

.profile-pic img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #fff;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
    transition:0.3s;
}

.profile-pic img:hover{
    transform:scale(1.05);
}

.profile-pic input{
    display:none;
}
.upload-label{
    display:inline-block;
    margin-top:10px;
    font-size:13px;
    cursor:pointer;
    opacity:0.8;
}

.upload-label:hover{
    opacity:1;
}
</style>
</head>
<body style="background-image: url('2.svg'); background-repeat: no-repeat; background-size: cover; display:flex; align-items:center; justify-content:center; height:100vh;">
    
    <div class="panel fade-in" style="width:100%; max-width:400px;">
            <div class="profile-pic">
        <h2>Register</h2>
    </div>
        <form onsubmit="window.location.href='options.html'; return false;">
            <input type="text" placeholder="Name" required>
            <input type="text" placeholder="Father's Name" required>
            <input type="text" placeholder="Grandfather's Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="New Password" required>
            <input type="password" placeholder="Confirm Password" required>
            <p>Have an account?<a href="auth.html">Sign in</a></p>
            <button class="btn-main">Start Now!</button>
        </form>
    </div>
    <script>
        
const imageUpload=document.getElementById("imageUpload");
const preview=document.getElementById("preview");
const message=document.getElementById("message");

imageUpload.addEventListener("change",function(){
    const file=this.files[0];
    if(file){
        const reader=new FileReader();
        reader.onload=e=>preview.src=e.target.result;
        reader.readAsDataURL(file);
    }
});

function saveChanges(){
    const name=document.getElementById("name").value.trim();
    const email=document.getElementById("email").value.trim();
    const password=document.getElementById("password").value.trim();

    message.textContent="";
    message.className="message";
}
    </script>
</body>
</html>
