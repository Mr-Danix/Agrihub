<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>AgriHub | Login</title><link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
     p{
        text-align: center;
        color: #000000;
    }
    a{
        padding: 5px;
    }
    .profile-pic{
    text-align:center;
    margin-bottom:25px;
}

.profile-pic img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #fff;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
    transition:0.3s;
}

.profile-pic img:hover{
    transform:scale(1.05);
}

.profile-pic input{
    display:none;
}
.upload-label{
    display:inline-block;
    margin-top:10px;
    font-size:13px;
    cursor:pointer;
    opacity:0.8;
}

.upload-label:hover{
    opacity:1;
}
</style>
</head>
<body style="background-image: url('2.svg'); background-repeat: no-repeat; background-size: cover; display:flex; align-items:center; justify-content:center; height:100vh;">
    
    <div class="panel fade-in" style="width:100%; max-width:400px;">
            <div class="profile-pic">
        <img id="preview" src="https://via.placeholder.com/110">
        <br>
        <label for="imageUpload" class="upload-label">Change Photo</label>
        <input type="file" id="imageUpload" accept="image/*">
    </div>
        <form onsubmit="window.location.href='options.html'; return false;">
            <input type="text" placeholder="Full name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            <p>Don't have an account?<a href="register.html">Register</a></p>
            <button class="btn-main">Access Marketplace</button>
        </form>
    </div>
    <script>
        
        
        
const imageUpload = document.getElementById("imageUpload");
const preview = document.getElementById("preview");

// Load existing image on page load if it exists
document.addEventListener('DOMContentLoaded', () => {
    const savedImage = localStorage.getItem('userPFP');
    if (savedImage) {
        preview.src = savedImage;
    }
});

imageUpload.addEventListener("change", function() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = e => {
            const imageData = e.target.result;
            preview.src = imageData;
            // Save to localStorage immediately
            localStorage.setItem('userPFP', imageData);
        };
        reader.readAsDataURL(file);
    }
});

    // Clear the stored profile picture upon logout
    localStorage.removeItem('userPFP');
    
    // Redirect to sign in page
    window.location.href = "auth.html"; 
}
    </script>
</body>
</html>
