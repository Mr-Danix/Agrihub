<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>AgriHub | Sell</title><link rel="stylesheet" href="style2.css">
    <style>
         .profile-pic{
    text-align:center;
    margin-bottom:25px;
}

.profile-pic img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #fff;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
    transition:0.3s;
}

.profile-pic img:hover{
    transform:scale(1.05);
}

.profile-pic input{
    display:none;
}
.stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .stat-number {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        .inventory-list { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .inventory-list th, .inventory-list td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: #e1f5fe;
            color: #0288d1;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">AgriHub</div>
        <nav>
            <a href="farmer.html" class="nav-btn ">Home</a>
            <a href="sell.html" class="nav-btn">Sell</a>
            
            <a href="contact2.html" class="nav-btn">Contact</a>
            
        </nav>
    </header>
  <main class="wrap">
        <div class="stats-grid">
            <div class="stat-card">
                <span class="muted">Total Sales</span>
                <span class="stat-number">12,450 ETB</span>
            </div>
            <div class="stat-card">
                <span class="muted">Active Listings</span>
                <span class="stat-number" id="listingCount">0</span>
            </div>
            
        </div>

        <div class="grid" style="grid-template-columns: 1fr 2fr;">
            <div class="panel fade-in">
                <h3>List New Product</h3>
                <form id="productForm" onsubmit="handleProductSubmit(event)">
                    <div class="form-group">
                        <label>Crop/Product Name</label>
                        <input type="text" id="pName" placeholder="e.g. Teff, Coffee Beans" required>
                    </div>
                    <div class="form-group">
                        <label>Price (ETB per kg)</label>
                        <input type="number" id="pPrice" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Stock Quantity (kg)</label>
                        <input type="number" id="pStock" placeholder="Amount available" required>
                    </div>
                    <button type="submit" class="btn-main">Post Listing</button>
                </form>
            </div>

            <div class="panel fade-in">
                <h3>Your Inventory</h3>
                <table class="inventory-list">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>
     <script>
        // Specific logic for Farmer Portal
        // 1. Initialize the array from storage or default values
let myProducts = JSON.parse(localStorage.getItem('farmerProducts')) || [
    { name: "Organic Teff", price: 85, stock: 500 },
    { name: "Harar Coffee", price: 420, stock: 50 }
];

// 2. The function to draw the table and the buttons
function renderInventory() {
    const table = document.getElementById('inventoryBody');
    const count = document.getElementById('listingCount');
    
    if (!table) return; // Guard clause
    table.innerHTML = '';
    
    myProducts.forEach((item, index) => {
        table.innerHTML += `
            <tr>
                <td><strong>${item.name}</strong></td>
                <td>${item.price} ETB</td>
                <td>${item.stock} kg</td>
                <td>
                    <span class="status-pill">Active</span>
                    <button onclick="deleteProduct(${index})" 
                            style="margin-left:10px; background:#ff4444; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">
                        Remove
                    </button>
                </td>
            </tr>
        `;
    });
    if (count) count.innerText = myProducts.length;
}

// 3. THE REMOVE LOGIC: This makes it disappear when touched
function deleteProduct(index) {
    // Remove the item from the array using its position (index)
    myProducts.splice(index, 1); 
    
    // Update the permanent storage so it stays gone
    localStorage.setItem('farmerProducts', JSON.stringify(myProducts)); 
    
    // Re-run the render function to update the screen immediately
    renderInventory(); 
}

// 4. Handle adding new products
function handleProductSubmit(e) {
    e.preventDefault();
    const newProd = {
        name: document.getElementById('pName').value,
        price: document.getElementById('pPrice').value,
        stock: document.getElementById('pStock').value
    };
    
    myProducts.unshift(newProd); 
    localStorage.setItem('farmerProducts', JSON.stringify(myProducts));
    renderInventory();
    e.target.reset();
}

// 5. Setup functions for Logout UI
function showLogout() {
    var box = document.getElementById("logoutBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function logout() {
    window.location.href = "auth.html"; 
}

// Initial render when the page loads
renderInventory();
function logout() {
    // Redirect to sign in page
    window.location.href = "auth.html"; 
}
    </script>
     <script src="script.js"></script>
    </body>
    </html>
